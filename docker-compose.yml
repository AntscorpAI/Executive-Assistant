services:
  nginx:
    image: nginx:alpine
    container_name: sage-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: sage-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sage}
      POSTGRES_USER: ${POSTGRES_USER:-sage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sage} -d ${POSTGRES_DB:-sage}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: sage-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage

  waha:
    image: devlikeapro/waha:noweb-arm
    container_name: sage-waha
    restart: always
    environment:
      WHATSAPP_API_KEY: ${EVOLUTION_API_KEY:-change-me-wa}
      WHATSAPP_HOOK_URL: http://backend:8000/api/webhooks/whatsapp
      WHATSAPP_HOOK_EVENTS: message
      WAHA_START_SESSION: ${WAHA_START_SESSION:-default}
      WAHA_PRINT_QR: "false"
      WAHA_LOG_LEVEL: info
      WAHA_WEBHOOKS_TIMEOUT: 10000
      WAHA_WEBHOOKS_RETRY_ATTEMPTS: 3
      WAHA_WEBHOOKS_RETRY_DELAY_SECONDS: 2
    volumes:
      - waha_sessions:/app/.sessions
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: sage-backend
    restart: always
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "${OLLAMA_REMOTE_HOST_ALIAS:-llm-server}:${OLLAMA_REMOTE_HOST_IP:-100.70.5.76}"
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: sage-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  waha_sessions:
