services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sage_new}
      POSTGRES_USER: ${POSTGRES_USER:-sage_user_new}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-sage-db}
    container_name: ${COMPOSE_PROJECT_NAME:-sage_ai_new}_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sage_user_new} -d ${POSTGRES_DB:-sage_new}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME:-sage_ai_new}_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    container_name: ${COMPOSE_PROJECT_NAME:-sage_ai_new}_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
